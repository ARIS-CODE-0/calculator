<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App | Aris Calc ⚡</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo"><span>⚡</span> Aris Calc</a>
        <div class="nav-links">
            <a href="index.html#features">Features</a>
            <a href="pricing.html">Pricing</a>
            <a href="app.html" class="btn-primary">App</a>
        </div>
    </nav>

    <div class="calculator-wrapper">
        <div class="calculator">
            <div class="display">
                <div id="previous-operand"></div>
                <div id="current-operand">0</div>
            </div>
            <div class="buttons">
                <button class="span-two" onclick="clearDisplay()">AC</button>
                <button onclick="deleteLast()">DEL</button>
                <button class="operator" onclick="chooseOperator('÷')">÷</button>
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="chooseOperator('×')">×</button>
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="chooseOperator('-')">-</button>
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="operator" onclick="chooseOperator('+')">+</button>
                <button onclick="appendNumber('0')">0</button>
                <button onclick="appendNumber('.')">.</button>
                <button class="span-two equals" onclick="compute()">=</button>
            </div>
        </div>
    </div>

    <script>
        // Paywall Check
        if (localStorage.getItem('aris_calc_paid') !== 'true') {
            alert("⚠️ ACCESS DENIED: This is a premium calculator. Please visit the pricing page to unlock.");
            window.location.href = 'pricing.html';
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
